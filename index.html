<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workshop: Construa com IA — Claude, Claude Code & Aplicações Reais</title>
<meta name="description" content="Workshop presencial sobre Claude, Claude Code e criação de aplicações com IA. Para quem quer parar de perguntar e começar a construir.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090b;
    --bg-card: #111113;
    --bg-card-hover: #19191d;
    --text: #ededef;
    --text-muted: #7a7a85;
    /* CORES PROMOOVE IA */
    --accent: #00d35a; 
    --accent-light: #5efc82;
    --accent-glow: rgba(0, 211, 90, 0.15);
    --code-bg: #0d1117;
    --code-green: #7ee787;
    --code-orange: #ffa657;
    --code-purple: #d2a8ff;
    --code-gray: #484f58;
    --border: #1e1e22;
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.6; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999;
  }
  .container { max-width: 760px; margin: 0 auto; padding: 0 24px; }
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 14px 24px; display: flex; justify-content: space-between; align-items: center;
    background: rgba(9,9,11,0.88); backdrop-filter: blur(24px);
    border-bottom: 1px solid var(--border);
  }
  nav .logo { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 13px; color: var(--text-muted); letter-spacing: 1px; }
  nav .logo span { color: var(--accent-light); }
  nav .cta-nav { background: var(--accent); color: #000; padding: 8px 20px; border-radius: 100px; font-size: 13px; font-weight: 600; text-decoration: none; transition: all 0.3s ease; }
  nav .cta-nav:hover { transform: scale(1.05); box-shadow: 0 0 30px var(--accent-glow); }

  .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding-top: 80px; position: relative; }
  .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: var(--bg-card); border: 1px solid var(--border); padding: 7px 14px; border-radius: 100px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent-light); font-weight: 500; margin-bottom: 32px; width: fit-content; animation: fadeInUp 0.8s ease both; }
  .hero-badge .dot { width: 7px; height: 7px; background: var(--accent-light); border-radius: 50%; animation: pulse 2s infinite; }
  .hero h1 { font-family: 'Instrument Serif', serif; font-size: clamp(44px,8.5vw,82px); line-height: 1.02; font-weight: 400; letter-spacing: -2px; margin-bottom: 28px; animation: fadeInUp 0.8s ease 0.1s both; }
  .hero h1 em { font-style: italic; background: linear-gradient(135deg, var(--accent-light), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .hero-sub { font-size: 18px; color: var(--text-muted); max-width: 520px; line-height: 1.7; margin-bottom: 40px; animation: fadeInUp 0.8s ease 0.2s both; }
  .hero-sub strong { color: var(--text); font-weight: 500; }
  .hero-code { background: var(--code-bg); border: 1px solid #21262d; border-radius: 12px; padding: 20px 24px; font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.8; margin-bottom: 40px; max-width: 500px; animation: fadeInUp 0.8s ease 0.25s both; overflow-x: auto; }
  .hero-code .prompt { color: var(--code-gray); }
  .hero-code .cmd { color: var(--code-green); }
  .hero-code .flag { color: var(--code-orange); }
  .hero-code .comment { color: var(--code-gray); font-style: italic; }
  .hero-code .output { color: var(--code-purple); }
  .hero-meta { display: flex; flex-wrap: wrap; gap: 24px; margin-bottom: 48px; animation: fadeInUp 0.8s ease 0.3s both; }
  .hero-meta .item { display: flex; align-items: center; gap: 10px; font-size: 15px; }
  .hero-meta .item .icon { width: 38px; height: 38px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .hero-meta .item span { color: var(--text-muted); font-size: 12px; display: block; }
  .hero-meta .item strong { font-weight: 500; }
  .hero-cta { display: inline-flex; align-items: center; gap: 12px; background: var(--accent); color: #000; padding: 18px 36px; border-radius: 100px; font-size: 16px; font-weight: 700; text-decoration: none; transition: all 0.3s ease; animation: fadeInUp 0.8s ease 0.4s both; width: fit-content; }
  .hero-cta:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 8px 40px var(--accent-glow); }
  .hero-cta .arrow { transition: transform 0.3s ease; }
  .hero-cta:hover .arrow { transform: translateX(4px); }
  .hero::after { content: ''; position: absolute; top: 15%; right: -10%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(0, 211, 90, 0.05) 0%, transparent 65%); pointer-events: none; }

  section { padding: 100px 0; }
  .section-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--accent-light); margin-bottom: 16px; }
  .section-title { font-family: 'Instrument Serif', serif; font-size: clamp(30px,5vw,46px); font-weight: 400; line-height: 1.15; letter-spacing: -1px; margin-bottom: 48px; }

  .audience-grid { display: grid; gap: 12px; }
  .audience-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px 26px; display: flex; align-items: center; gap: 16px; transition: all 0.3s ease; }
  .audience-item:hover { background: var(--bg-card-hover); border-color: #2a2a30; }
  .audience-item .check { width: 28px; height: 28px; flex-shrink: 0; background: rgba(0, 211, 90, 0.12); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--accent-light); font-size: 14px; font-weight: 700; }
  .audience-item p { font-size: 15px; color: var(--text-muted); }
  .audience-item p strong { color: var(--text); font-weight: 500; }

  .stack-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
  .stack-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 24px; transition: all 0.4s ease; position: relative; overflow: hidden; }
  .stack-card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
  .stack-card .tool-name { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--accent-light); font-weight: 600; margin-bottom: 12px; letter-spacing: 0.5px; }
  .stack-card h3 { font-family: 'Instrument Serif', serif; font-size: 22px; font-weight: 400; margin-bottom: 10px; }
  .stack-card p { font-size: 13px; color: var(--text-muted); line-height: 1.65; }

  .timeline { position: relative; padding-left: 32px; }
  .timeline::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom, var(--accent), var(--border)); }
  .timeline-item { position: relative; margin-bottom: 40px; padding-left: 24px; }
  .timeline-item::before { content: ''; position: absolute; left: -37px; top: 6px; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; border: 3px solid var(--bg); }
  .timeline-item .time { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent-light); font-weight: 600; letter-spacing: 1px; margin-bottom: 6px; }
  .timeline-item h3 { font-family: 'Instrument Serif', serif; font-size: 22px; font-weight: 400; margin-bottom: 6px; }
  .timeline-item p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
